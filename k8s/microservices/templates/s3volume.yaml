{{- range $serviceName, $service := .Values.services }}
{{- if and ($service.enabled | default true) ($service.s3Volumes) }}
{{- range $volName, $vol := $service.s3Volumes }}
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: {{ $serviceName }}-{{ $volName }}-s3-pv
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
spec:
  capacity:
    storage: 1200Gi
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  mountOptions:
    - allow-other
    - region {{ $.Values.awsRegion | default "us-east-1" }}
    {{- if $vol.uid }}
    - uid={{ $vol.uid }}
    {{- end }}
    {{- if $vol.gid }}
    - gid={{ $vol.gid }}
    {{- end }}
    {{- if $vol.readOnly }}
    - read-only
    {{- end }}
  csi:
    driver: s3.csi.aws.com
    volumeHandle: {{ $serviceName }}-{{ $volName }}-s3
    volumeAttributes:
      bucketName: {{ tpl $vol.bucketName $ }}
      authenticationSource: driver
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $serviceName }}-{{ $volName }}-s3-pvc
  namespace: {{ $service.namespace.name | default "default" }}
spec:
  accessModes:
    - ReadOnlyMany
  storageClassName: ""
  resources:
    requests:
      storage: 1200Gi
  volumeName: {{ $serviceName }}-{{ $volName }}-s3-pv
{{- end }}
{{- end }}
{{- end }}
