defaults:
  replicas: 2
  containerPort: 80
  servicePort: 80
  imagePullPolicy: Always
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

x-gpuResources: &gpuResources
  requests:
    cpu: 3000m
    memory: 24Gi
    nvidia.com/gpu: 1
  limits:
    cpu: 3500m
    memory: 28Gi
    nvidia.com/gpu: 1

x-gpuNodeSelector: &gpuNodeSelector
  gpu: "true"

x-gpuTolerations: &gpuTolerations
  - key: nvidia.com/gpu
    operator: Equal
    value: "true"
    effect: NoSchedule

services:
  frontend:
    enabled: true
    namespace:
      name: frontend
      create: true
    image:
      repository: frontend
      tag: '20260322141840'
    replicas: 2
    containerPort: 80
    servicePort: 80
    healthCheck:
      path: /health
      initialDelaySeconds: 10
      periodSeconds: 10
    ingress:
      enabled: true
      subdomain: personaplex
      scheme: internet-facing
      targetType: ip
      backendProtocol: HTTP
      healthCheckPath: /health

  personaplex:
    enabled: true
    namespace:
      name: personaplex
      create: true
    serviceAccount:
      roleArn: "{{ .Values.personaplexRoleArn }}"
    image:
      repository: personaplex
      tag: '20260322141840'
    replicas: 1
    containerPort: 8998
    servicePort: 8998
    awsSecrets:
      - secretName: "{{ .Values.hfTokenSecretName }}"
        jmesPath:
          - path: "HF_TOKEN"
            objectAlias: "HF_TOKEN"
    env:
      CPU_OFFLOAD: "false"
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      TORCHDYNAMO_DISABLE: "1"
      CUDA_MODULE_LOADING: "LAZY"
      OMP_NUM_THREADS: "2"
    healthCheck:
      port: 8999
      path: /api/voices
      livenessPort: 8998
      livenessPath: /
      livenessScheme: HTTPS
      livenessInitialDelaySeconds: 240
      livenessPeriodSeconds: 30
      livenessFailureThreshold: 3
      startupProbe: true
      startupInitialDelaySeconds: 5
      startupPeriodSeconds: 10
      startupFailureThreshold: 6
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    resources: *gpuResources
    additionalPorts:
      - name: voices
        port: 8999
        targetPort: 8999
    s3Volumes:
      ptfiles:
        bucketName: "{{ .Values.s3BucketPtfiles }}"
        mountPath: /mnt/models
        readOnly: true
        uid: 1000
        gid: 1000
    nodeSelector: *gpuNodeSelector
    tolerations: *gpuTolerations

jobs:
  voice-generator:
    enabled: true
    namespace:
      name: personaplex
    serviceAccount:
      roleArn: "{{ .Values.voiceGeneratorRoleArn }}"
    image:
      repository: voice-generator
      tag: '20260322141840'
    backoffLimit: 1
    restartPolicy: Never
    env:
      WAV_DIR: "/mnt/input/wavs"
      OUTPUT_PATH: "voice_prompt.wav"
      S3_OUTPUT_BUCKET: "{{ .Values.s3BucketPtfiles }}"
    s3Volumes:
      wavfiles:
        bucketName: "{{ .Values.s3BucketWavfiles }}"
        mountPath: /mnt/input
        readOnly: true
        uid: 1000
        gid: 1000
      ptfiles:
        bucketName: "{{ .Values.s3BucketPtfiles }}"
        mountPath: /mnt/output
        readOnly: false
        uid: 1000
        gid: 1000
    resources:
      requests:
        cpu: 500m
        memory: 4Gi
      limits:
        cpu: 2000m
        memory: 8Gi
